services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017/easygenerator
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-this-access-secret-in-production}
      JWT_ACCESS_EXPIRES_IN_MINUTES: 15
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      JWT_REFRESH_EXPIRES_IN_DAYS: 7
      # Demo runs over plain HTTP on localhost, so secure cookies are disabled.
      # Behind HTTPS set COOKIE_SECURE=true (and COOKIE_SAMESITE=none if cross-site).
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: lax
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  mongo-data:
